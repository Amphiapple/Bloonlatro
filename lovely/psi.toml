[manifest]
dump_lua = true
priority = 1
version = "1.0.0"

[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
function Game:update_blind_select(dt)
    if self.buttons then self.buttons:remove(); self.buttons = nil end
    if self.shop then self.shop:remove(); self.shop = nil end

    if not G.STATE_COMPLETE then
'''
position = 'after'
payload = '''
G.deck:shuffle('nr'..G.GAME.round_resets.ante)
G.deck:hard_set_T()
if G.GAME.selected_back and G.GAME.selected_back.effect and G.GAME.selected_back.effect.center and G.GAME.selected_back.effect.center.key == 'b_bloons_psi' then
    local cards = G.GAME.selected_back.effect.center:get_next_cards()
    G.FUNCS.update_psi_ui(cards)
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
G.E_MANAGER:add_event(Event({
    trigger = 'immediate',
    func = function()
        G.STATE = G.STATES.DRAW_TO_HAND
        G.deck:shuffle('nr'..G.GAME.round_resets.ante)
        G.deck:hard_set_T()
        G.STATE_COMPLETE = false
        return true
    end
}))
'''
position = 'at'
payload = '''
G.E_MANAGER:add_event(Event({
    trigger = 'immediate',
    func = function()
        G.STATE = G.STATES.DRAW_TO_HAND
        G.STATE_COMPLETE = false
        return true
    end
}))
'''
match_indent = true