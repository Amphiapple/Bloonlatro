[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# TUTORIAL - Start Run
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
UIBox_button{id = 'main_menu_play', button = not G.SETTINGS.tutorial_complete and "start_run" or "setup_run", colour = G.C.BLUE, minw = 3.65, minh = 1.55, label = {localize('b_play_cap')}, scale = text_scale*2, col = true},
'''
match_indent = true
position = 'at'
payload = '''
UIBox_button{id = 'main_menu_play', button = (not G.SETTINGS.bloonlatro_tutorial_complete and "start_bloonlatro_tutorial_run") or "setup_run", colour = G.C.BLUE, minw = 3.65, minh = 1.55, label = {localize('b_play_cap')}, scale = text_scale*2, col = true},
'''

# TUTORIAL - Tutorial Controller
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
if not G.SETTINGS.tutorial_complete then G.FUNCS.tutorial_controller() end
'''
match_indent = true
position = 'at'
payload = '''
if not G.SETTINGS.bloonlatro_tutorial_complete then G.FUNCS.bloonlatro_tutorial_controller() end
'''

# TUTORIAL - Forced generation
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
local forced_voucher = (G.SETTINGS.tutorial_progress or {}).forced_voucher
'''
match_indent = true
position = 'after'
payload = '''
forced_voucher = (G.SETTINGS.bloonlatro_tutorial_progress or {}).forced_voucher
'''

# TUTORIAL - Forced generation
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
self.GAME.round_resets.blind_tags.Small = G.SETTINGS.tutorial_progress and G.SETTINGS.tutorial_progress.forced_tags and G.SETTINGS.tutorial_progress.forced_tags[1] or get_next_tag_key()
'''
match_indent = true
position = 'at'
payload = '''
self.GAME.round_resets.blind_tags.Small = G.SETTINGS.tutorial_progress and G.SETTINGS.tutorial_progress.forced_tags and G.SETTINGS.tutorial_progress.forced_tags[1] or (G.SETTINGS.bloonlatro_tutorial_progress and G.SETTINGS.bloonlatro_tutorial_progress.forced_tags and G.SETTINGS.bloonlatro_tutorial_progress.forced_tags[1]) or get_next_tag_key()
'''

# TUTORIAL - Forced generation
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
self.GAME.round_resets.blind_tags.Big = G.SETTINGS.tutorial_progress and G.SETTINGS.tutorial_progress.forced_tags and G.SETTINGS.tutorial_progress.forced_tags[2] or get_next_tag_key()
'''
match_indent = true
position = 'at'
payload = '''
self.GAME.round_resets.blind_tags.Big = G.SETTINGS.tutorial_progress and G.SETTINGS.tutorial_progress.forced_tags and G.SETTINGS.tutorial_progress.forced_tags[2] or (G.SETTINGS.bloonlatro_tutorial_progress and G.SETTINGS.bloonlatro_tutorial_progress.forced_tags and G.SETTINGS.bloonlatro_tutorial_progress.forced_tags[2]) or get_next_tag_key()
'''

# TUTORIAL - Forced Joker
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
if area == G.shop_jokers and G.SETTINGS.tutorial_progress and G.SETTINGS.tutorial_progress.forced_shop and G.SETTINGS.tutorial_progress.forced_shop[#G.SETTINGS.tutorial_progress.forced_shop] then
        local t = G.SETTINGS.tutorial_progress.forced_shop
        local _center = G.P_CENTERS[t[#t]] or G.P_CENTERS.c_empress
        local card = Card(area.T.x + area.T.w/2, area.T.y, G.CARD_W, G.CARD_H, G.P_CARDS.empty, _center, {bypass_discovery_center = true, bypass_discovery_ui = true})
        t[#t] = nil
        if not t[1] then G.SETTINGS.tutorial_progress.forced_shop = nil end
        
        create_shop_card_ui(card)
        return card
'''
match_indent = true
position = 'at'
payload = '''
if area == G.shop_jokers and G.SETTINGS.bloonlatro_tutorial_progress and G.SETTINGS.bloonlatro_tutorial_progress.forced_shop and G.SETTINGS.bloonlatro_tutorial_progress.forced_shop[#G.SETTINGS.bloonlatro_tutorial_progress.forced_shop] then
        local t = G.SETTINGS.bloonlatro_tutorial_progress.forced_shop
        local _center = G.P_CENTERS[t[#t]] or G.P_CENTERS.c_empress
        local card = Card(area.T.x + area.T.w/2, area.T.y, G.CARD_W, G.CARD_H, G.P_CARDS.empty, _center, {bypass_discovery_center = true, bypass_discovery_ui = true})
        t[#t] = nil
        if not t[1] then G.SETTINGS.bloonlatro_tutorial_progress.forced_shop = nil end
        
        create_shop_card_ui(card)
        return card
'''

# TUTORIAL - tutorial autocomplete
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
if (not G.SETTINGS.tutorial_complete) and G.SETTINGS.tutorial_progress.completed_parts['big_blind'] then G.SETTINGS.tutorial_complete = true end
'''
match_indent = true
position = 'at'
payload = '''
if (not G.SETTINGS.bloonlatro_tutorial_complete) and G.SETTINGS.bloonlatro_tutorial_progress and G.SETTINGS.bloonlatro_tutorial_progress.completed_parts['shop_3'] then G.SETTINGS.bloonlatro_tutorial_complete = true end
if G.SETTINGS.bloonlatro_tutorial_complete then
G.SETTINGS.bloonlatro_tutorial_progress = nil
end
'''

# TUTORIAL - tutorial seed
[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
self.GAME.pseudorandom.seed = args.seed or (not (G.SETTINGS.tutorial_complete or G.SETTINGS.tutorial_progress.completed_parts['big_blind']) and "TUTORIAL") or generate_starting_seed()
'''
match_indent = true
position = 'after'
payload = '''
self.GAME.pseudorandom.seed = (not (G.SETTINGS.bloonlatro_tutorial_complete or G.SETTINGS.bloonlatro_tutorial_progress.completed_parts['shop_3']) and "FANCLUB") or self.GAME.pseudorandom.seed
'''