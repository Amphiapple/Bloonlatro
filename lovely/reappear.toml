[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

# Reappear check
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "elseif not (G.GAME.used_jokers[v.key] and not pool_opts.allow_duplicates and not SMODS.showman(v.key)) and"
position = 'at'
payload = '''elseif (not G.GAME.used_jokers[v.key] or
    (v.config.tower_info and v.config.tower_info.base == 'Ninja Monkey' and #find_joker('Shinobi Tactics') > 0) or
    (v.set == 'Joker' and #find_joker('Monkey Village') > 0) or
    (v.set == 'Joker' and #find_joker('Bigger Radius') > 0 and (v.rarity == 'Uncommon' or v.rarity == 'Rare')) or
    (v.name == 'Mega Mine') or
    pool_opts.allow_duplicates or
    SMODS.showman(v.key)) and
'''
match_indent = true
