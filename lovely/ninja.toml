[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

# Ninja full slots buy
[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
G.FUNCS.can_select_card = function(e)
  local card = e.config.ref_table
'''
position = 'after'
payload = '''
  if card.ability.set == 'Joker' and card.ability.base and card.ability.base == 'ninja' and card:is_rarity('Common') then
    e.config.colour = G.C.GREEN
    e.config.button = 'use_card'
    return
  end
'''
match_indent = true

# Ninja full slots select
[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
G.FUNCS.check_for_buy_space = function(card)
'''
position = 'after'
payload = '''
  if card.ability.set == 'Joker' and card.ability.base and card.ability.base == 'ninja' and card:is_rarity('Common') then
    return true
  end
'''
match_indent = true

# Reappear check
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "elseif not (G.GAME.used_jokers[v.key] and not pool_opts.allow_duplicates and not SMODS.showman(v.key)) and"
position = 'at'
payload = '''elseif (not G.GAME.used_jokers[v.key] or
    (v.config.base == 'ninja' and #find_joker('Shinobi Tactics') > 0) or
    (v.set == 'Joker' and #find_joker('Monkey Village') > 0) or
    pool_opts.allow_duplicates or
    SMODS.showman(v.key)) and
'''
match_indent = true
