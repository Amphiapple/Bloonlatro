[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

# Force Bosses
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "if G.FORCE_BOSS then return G.FORCE_BOSS end"
position = 'after'
payload = '''
local center = G.GAME.selected_back and G.GAME.selected_back.effect and G.GAME.selected_back.effect.center
if G.GAME.round_resets.ante % G.GAME.win_ante == 0 and center and center.key == "b_bloons_boss_challenge" then
    local boss = center.get_boss_blind and center:get_boss_blind()
    if boss then
        return boss.key
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "function reset_blinds()"
position = "after"
payload = '''
    local small = "bl_small"
    local big = "bl_big"
    local center = G.GAME.selected_back and G.GAME.selected_back.effect and G.GAME.selected_back.effect.center
    G.GAME.round_resets.blind_choices = G.GAME.round_resets.blind_choices or {}
    if G.GAME.round_resets.ante%G.GAME.win_ante == 0 and center and center.key == "b_bloons_boss_challenge" then
        local segments = center.get_boss_segments and center:get_boss_segments() or {}
        small = (segments[1] and segments[1].key) or small
        big = (segments[2] and segments[2].key) or big
    end
    G.GAME.round_resets.blind_choices.Small = small
    G.GAME.round_resets.blind_choices.Big = big
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
if G.GAME.round_resets.blind == G.P_BLINDS.bl_small then
    G.GAME.round_resets.blind_states.Small = 'Defeated'
elseif G.GAME.round_resets.blind == G.P_BLINDS.bl_big then
    G.GAME.round_resets.blind_states.Big = 'Defeated'
else
'''
position = 'at'
payload = '''
local center = G.GAME.selected_back and G.GAME.selected_back.effect and G.GAME.selected_back.effect.center
local segments = center and center.get_boss_segments and center:get_boss_segments() or {}
local small_boss = segments[1]
local big_boss = segments[2]
local current_blind_key = G.GAME.round_resets.blind and G.GAME.round_resets.blind.key or nil

local is_small = G.GAME.round_resets.blind == G.P_BLINDS.bl_small or (small_boss and current_blind_key == small_boss.key)
local is_big = G.GAME.round_resets.blind == G.P_BLINDS.bl_big or (big_boss and current_blind_key == big_boss.key)

if is_small then
    G.GAME.round_resets.blind_states.Small = 'Defeated'
elseif is_big then
    G.GAME.round_resets.blind_states.Big = 'Defeated'
else
'''
match_indent = true

# Disable ZOMG when selling jokers
[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = "if self.ability.set == 'Joker' and G.GAME.blind and G.GAME.blind.name == 'Verdant Leaf' then "
position = 'at'
payload = "if self.ability.set == 'Joker' and G.GAME.blind and (G.GAME.blind.name == 'Verdant Leaf' or G.GAME.blind.name == 'Green Gargantuan') then "
match_indent = true

# Custom loc_debuff_text for boss blinds
[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = '''
    self.loc_debuff_text = self.loc_debuff_text..v..(k <= #loc_target and ' ' or '')
'''
position = 'before'
payload = '''
if G.GAME.round_resets.ante%G.GAME.win_ante == 0 and G.GAME.round_resets.ante >= 2 and G.GAME.selected_back and G.GAME.selected_back.effect.center.key == "b_bloons_boss_challenge" then
    self.loc_debuff_text = 'It has all led to this'
else
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = '''
    self.loc_debuff_text = self.loc_debuff_text..v..(k <= #loc_target and ' ' or '')
'''
position = 'after'
payload = '''
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'back.lua'
pattern = '''
        challenge.id and UIBox_button({button = 'deck_view_challenge', label = {localize(challenge.id, 'challenge_names')},  minw = 2.2, minh = 1, scale = 0.6, id = challenge})
        or desc_from_rows(loc_nodes, true, min_dims*5)
'''
position = 'at'
payload = '''
        challenge.id and UIBox_button({button = 'deck_view_challenge', label = {localize(challenge.id, 'challenge_names')},  minw = 2.2, minh = 1, scale = 0.6, id = challenge})
        or (self.effect.center.key == "b_bloons_boss_challenge" and {
            n = G.UIT.R,
            config = { align = "cm", padding = 0.1 },
            nodes = (function()
                local nodes = {}
                local boss = self.effect.center.get_boss_blind and self.effect.center:get_boss_blind()
                local segments = self.effect.center.get_boss_segments and self.effect.center:get_boss_segments() or {}

                if boss then
                    for _, blind in ipairs(segments) do
                        nodes[#nodes + 1] = {
                            n = G.UIT.O,
                            config = {
                                object = create_bloonlatro_boss_card(blind)
                            }
                        }
                    end
                end

                return nodes
            end)()
        })
        or desc_from_rows(loc_nodes, true, min_dims*5)
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'back.lua'
pattern = '''
self.loc_name = localize{type = 'name_text', set = 'Back', key = self.effect.center.key}
'''
position = 'at'
payload = '''
if (selected_back and selected_back.key == "b_bloons_boss_challenge")
or (new_back and new_back.key == "b_bloons_boss_challenge") then
    local blind = self.effect.center.get_boss_blind and self.effect.center:get_boss_blind()
    local deck_text = localize({ type = 'name_text', set = 'Back', key = 'b_bloons_boss_challenge' })
    local blind_text = ""

    if blind then
        if blind.bloonlatro_boss and blind.bloonlatro_boss.parts then
            blind_text = localize({type = "name_text", set = "Blind", key = blind.key}):match("^(.-)%s+%S+$")
        else
            blind_text = localize({type = "name_text", set = "Blind", key = blind.key})
        end
    end

    local deck_suffix = deck_text:match("%S+$")

    if blind_text ~= "" then
        self.loc_name = blind_text .. " " .. deck_suffix
    else
        self.loc_name = deck_text
    end
else
    self.loc_name = localize{type = 'name_text', set = 'Back', key = self.effect.center.key}
end
'''
match_indent = true
