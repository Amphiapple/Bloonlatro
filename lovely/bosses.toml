[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

# Force Bosses
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "if G.FORCE_BOSS then return G.FORCE_BOSS end"
position = 'after'
payload = '''
if G.GAME.selected_back.name == 'Psi Deck' and (G.GAME.round_resets.ante%G.GAME.win_ante ~= 0 or G.GAME.round_resets.ante < 2) then
    return "bl_psychic"
elseif G.GAME.round_resets.ante%G.GAME.win_ante == 0 and G.GAME.round_resets.ante >= 2 and Bloonlatro.boss_id then
    return Bloonlatro.boss_id
end
'''
match_indent = true

# Disable ZOMG when selling jokers
[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = "if self.ability.set == 'Joker' and G.GAME.blind and G.GAME.blind.name == 'Verdant Leaf' then "
position = 'at'
payload = "if self.ability.set == 'Joker' and G.GAME.blind and (G.GAME.blind.name == 'Verdant Leaf' or G.GAME.blind.name == 'Green Gargantuan') then "
match_indent = true

# Custom loc_debuff_text for boss blinds
[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = '''
    self.loc_debuff_text = self.loc_debuff_text..v..(k <= #loc_target and ' ' or '')
'''
position = 'before'
payload = '''
if G.GAME.round_resets.ante%G.GAME.win_ante == 0 and G.GAME.round_resets.ante >= 2 and Bloonlatro.boss_id then
    self.loc_debuff_text = 'It has all led to this'
else
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'blind.lua'
pattern = '''
    self.loc_debuff_text = self.loc_debuff_text..v..(k <= #loc_target and ' ' or '')
'''
position = 'after'
payload = '''
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'back.lua'
pattern = '''
        challenge.id and UIBox_button({button = 'deck_view_challenge', label = {localize(challenge.id, 'challenge_names')},  minw = 2.2, minh = 1, scale = 0.6, id = challenge})
        or desc_from_rows(loc_nodes, true, min_dims*5)
'''
position = 'at'
payload = '''
        challenge.id and UIBox_button({button = 'deck_view_challenge', label = {localize(challenge.id, 'challenge_names')},  minw = 2.2, minh = 1, scale = 0.6, id = challenge})
        or (Bloonlatro.boss_id and #loc_nodes == 0 and {
            n = G.UIT.R,
            config = { align = "cm", padding = 0.1 },
            nodes = get_bloonlatro_boss_card_nodes()
        })
        or desc_from_rows(loc_nodes, true, min_dims*5)
'''
match_indent = true