[manifest]
version = "1.0.0"
dump_lua = true
priority = -6

# Monkey Town double payout
[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
i = 0
for _, target in ipairs(SMODS.get_card_areas('individual', 'calc_dollar_bonus')) do
'''
position = 'before'
payload = "local j = i"
match_indent = true


[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = "add_round_eval_row({name = 'bottom', dollars = dollars})"
position = 'before'
payload = '''
for _, area in ipairs(SMODS.get_card_areas('jokers')) do
    local total = 0
    for _, _card in ipairs(area.cards) do
        if _card.ability.name == 'Monkey Town' then
            j = j+1
            local ret = math.floor(dollars / 2)
            add_round_eval_row({dollars = ret, bonus = true, name='joker'..j, pitch = pitch, card = _card})
            pitch = pitch + 0.06
            total = total + ret
        end
    end
    dollars = dollars + total
end
'''
match_indent = true
